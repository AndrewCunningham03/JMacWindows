name: Keep Supabase project alive

# Supabase free-tier projects auto-pause after 7 days with zero activity.
# This pings the database every 3 days so it never goes idle, even if
# nobody opens the app for a while (e.g. a holiday).

on:
  schedule:
    - cron: '0 8 */3 * *'  # every 3 days at 08:00 UTC
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://xkcottkbmjlvqempqlsx.supabase.co/rest/v1/customers?select=id&limit=1" \
            -H "apikey: sb_publishable_OKoXX-AnIf1ci3yfzwg7DQ_Pygnu4rk"
