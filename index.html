<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Window Rounds">
<meta name="theme-color" content="#0ea5e9">
<link rel="manifest" href="manifest.json">
<title>Window Rounds</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#0ea5e9;--blue-dark:#0284c7;--blue-light:#e0f2fe;
  --green:#16a34a;--green-light:#dcfce7;
  --red:#dc2626;--red-light:#fee2e2;
  --amber:#d97706;--amber-light:#fef3c7;
  --gray:#6b7280;--gray-light:#f3f4f6;--gray-border:#e5e7eb;
  --text:#111827;--text-muted:#6b7280;
  --white:#ffffff;--bg:#f9fafb;
  --radius:12px;--radius-sm:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;overscroll-behavior:none}

/* Login */
#login-screen{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#0ea5e9 0%,#0284c7 100%);flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:999}
#login-screen.show{display:flex}
.login-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.login-logo{font-size:52px;text-align:center;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:24px}
#login-error{color:var(--red);font-size:13px;margin-bottom:10px;display:none;background:var(--red-light);padding:8px 12px;border-radius:var(--radius-sm)}

/* Loading */
#loading-screen{display:none;position:fixed;inset:0;background:#fff;flex-direction:column;align-items:center;justify-content:center;z-index:998;gap:12px}
#loading-screen.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--gray-border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* App */
#app{display:none;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--white)}
#app.show{display:flex}

/* Header */
.header{background:linear-gradient(135deg,#0ea5e9 0%,#0284c7 100%);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:12px;opacity:0.85;margin-top:1px}
.header-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer}
.header-week{background:rgba(255,255,255,0.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;letter-spacing:0.02em;white-space:nowrap}

/* Today banner */
.today-banner{background:var(--blue-light);border-bottom:1px solid #bae6fd;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.today-banner-left{font-size:13px;color:var(--blue-dark);font-weight:600}
.today-banner-right{font-size:12px;color:var(--blue-dark);opacity:0.8}

/* Nav */
.nav{display:flex;background:var(--white);border-top:1px solid var(--gray-border);flex-shrink:0;padding-bottom:var(--safe-bottom);position:sticky;bottom:0;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;border:none;background:none;color:var(--text-muted);font-size:9px;cursor:pointer;transition:color .15s}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab{display:none;padding:16px}
.tab.active{display:block}

/* Metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:var(--gray-light);border-radius:var(--radius-sm);padding:12px}
.metric-label{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.metric-value{font-size:26px;font-weight:700;margin-top:2px;line-height:1}
.metric-value.green{color:var(--green)}
.metric-value.red{color:var(--red)}
.metric-value.blue{color:var(--blue)}

/* Search */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--gray-border);border-radius:var(--radius-sm);font-size:15px;background:var(--white);color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:18px;height:18px}
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--gray-border);background:var(--white);font-size:13px;white-space:nowrap;cursor:pointer;color:var(--text-muted);flex-shrink:0}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* Cards */
.customer-card{background:var(--white);border:1px solid var(--gray-border);border-radius:var(--radius);padding:13px;margin-bottom:10px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-weight:600;font-size:15px}
.card-addr{font-size:13px;color:var(--text-muted);margin-top:2px}
.card-note{font-size:12px;color:var(--amber);margin-top:3px;font-style:italic}
.card-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500}
.badge-blue{background:var(--blue-light);color:var(--blue-dark)}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-gray{background:var(--gray-light);color:var(--gray)}
.card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--gray-border);background:var(--white);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none}
.btn:active{opacity:0.7}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-green{background:var(--green-light);color:var(--green);border-color:transparent}
.btn-red{background:var(--red-light);color:var(--red);border-color:transparent}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn-icon{padding:7px;border-radius:var(--radius-sm)}

/* Section */
.section-head{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:8px;margin-top:4px}

/* Route */
.route-section{margin-bottom:18px}
.route-title{font-size:16px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.route-count{font-size:13px;font-weight:400;color:var(--text-muted)}
.route-item{padding:11px 0;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.route-item:last-child{border-bottom:none}
.route-item-info{flex:1;min-width:0}
.route-item-name{font-weight:600;font-size:14px}
.route-item-addr{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.route-item-note{font-size:11px;color:var(--amber);font-style:italic}
.route-item-actions{display:flex;gap:5px;flex-shrink:0}

/* Week tabs */
.week-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.week-tabs::-webkit-scrollbar{display:none}

/* Notify */
.notify-select{width:100%;padding:10px 12px;border:1px solid var(--gray-border);border-radius:var(--radius-sm);font-size:15px;background:var(--white);color:var(--text);margin-bottom:10px;outline:none}
.notify-select:focus{border-color:var(--blue)}
.notify-msg-box{background:#f0fdf4;border-left:3px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px;font-size:14px;line-height:1.6;margin:10px 0;color:#15803d}
.notify-actions{display:flex;gap:8px;flex-wrap:wrap}

/* History */
.history-month{margin-bottom:20px}
.history-month-header{background:var(--blue-light);color:var(--blue-dark);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.history-month-name{font-weight:700;font-size:15px}
.history-month-stats{font-size:13px;font-weight:600}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--gray-border);font-size:14px}
.history-row:last-child{border-bottom:none}
.history-name{font-weight:500}
.history-meta{font-size:12px;color:var(--text-muted)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bottom));width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--gray-border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--gray-border);border-radius:var(--radius-sm);font-size:15px;background:var(--white);color:var(--text);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{min-height:70px;resize:none}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1;justify-content:center}

/* Toast */
.toast{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FAB */
.fab{position:fixed;bottom:calc(74px + var(--safe-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(14,165,233,0.4);z-index:40}
.fab:active{transform:scale(0.95)}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:8px}

/* Divider */
.divider{height:1px;background:var(--gray-border);margin:16px 0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="show">
  <div class="login-box">
    <div class="login-logo">🪣</div>
    <div class="login-title">Window Rounds</div>
    <div class="login-sub">Sign in to manage your round</div>
    <div id="login-error"></div>
    <div class="field"><label>Email</label><input id="login-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label>Password</label><input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn btn-blue btn-full" onclick="login()" style="font-size:15px;padding:12px;margin-top:4px">Sign In</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div style="color:var(--text-muted);font-size:14px">Loading your customers…</div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">🪣 Window Rounds</div>
      <div class="header-sub" id="header-sub">Loading…</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <span class="header-week" id="header-week"></span>
      <button class="header-btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="today-banner">
    <div class="today-banner-left" id="today-date"></div>
    <div class="today-banner-right" id="today-routes"></div>
  </div>

  <div class="content">
    <!-- CUSTOMERS -->
    <div class="tab active" id="tab-customers">
      <div class="metrics" id="metrics"></div>
      <div class="search-wrap">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search" placeholder="Search name or address…" oninput="renderCustomers()">
      </div>
      <div class="filter-row" id="route-chips"></div>
      <div id="customers-list"></div>
    </div>

    <!-- ROUTES -->
    <div class="tab" id="tab-routes">
      <div class="week-tabs" id="week-tabs"></div>
      <div id="routes-list"></div>
    </div>

    <!-- PAYMENTS -->
    <div class="tab" id="tab-payments">
      <div class="metrics" id="pay-metrics"></div>
      <div class="search-wrap">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="pay-search" placeholder="Search…" oninput="renderPayments()">
      </div>
      <div class="filter-row">
        <button class="chip active" onclick="setPayFilter('',this)">All</button>
        <button class="chip" onclick="setPayFilter('unpaid',this)">Unpaid</button>
        <button class="chip" onclick="setPayFilter('paid',this)">Paid</button>
      </div>
      <div id="payments-list"></div>
    </div>

    <!-- HISTORY -->
    <div class="tab" id="tab-history">
      <div class="metrics" id="hist-metrics"></div>
      <div class="filter-row" id="hist-year-tabs"></div>
      <div id="history-list"><div class="empty"><div class="empty-icon">📋</div>No history yet — mark jobs as done to start tracking</div></div>
    </div>

    <!-- NOTIFY -->
    <div class="tab" id="tab-notify">
      <div class="section-head">Single customer</div>
      <select class="notify-select" id="notify-customer" onchange="updateNotify()">
        <option value="">Choose a customer…</option>
      </select>
      <select class="notify-select" id="notify-type" onchange="updateNotify()">
        <option value="before">Night before reminder</option>
        <option value="after">Job complete</option>
        <option value="payment">Payment reminder</option>
      </select>
      <div id="notify-out"></div>
      <div class="divider"></div>
      <div class="section-head">Whole route</div>
      <select class="notify-select" id="bulk-route" onchange="updateBulk()">
        <option value="">Choose a route…</option>
      </select>
      <select class="notify-select" id="bulk-type" onchange="updateBulk()">
        <option value="before">Night before reminder</option>
        <option value="after">Job complete</option>
        <option value="payment">Payment reminder</option>
      </select>
      <div id="bulk-out"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('customers',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>
      Customers
    </button>
    <button class="nav-btn" onclick="showTab('routes',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
      Routes
    </button>
    <button class="nav-btn" onclick="showTab('payments',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Payments
    </button>
    <button class="nav-btn" onclick="showTab('history',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      History
    </button>
    <button class="nav-btn" onclick="showTab('notify',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      Notify
    </button>
  </nav>
</div>

<button class="fab" onclick="openAddModal()" aria-label="Add customer">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add customer</div>
    <div class="field"><label>Name *</label><input id="f-name" type="text" placeholder="Customer name"></div>
    <div class="field"><label>Address</label><input id="f-addr" type="text" placeholder="Street, town, postcode"></div>
    <div class="field"><label>Phone</label><input id="f-phone" type="tel" placeholder="+44…"></div>
    <div class="field"><label>Route</label>
      <select id="f-route">
        <option>Keady / Derrynoose</option><option>Armagh</option><option>Clady</option>
        <option>Kileavy / Dromintee</option><option>Camlough / Bessbrook</option>
        <option>Newtown</option><option>Cullyhannah</option><option>Crossmaglen</option>
        <option>Newry</option><option>Forkhill / Mullaghawn</option><option>Poyntzpass / Jerrettspass</option>
      </select>
    </div>
    <div class="field"><label>Frequency</label>
      <select id="f-freq"><option value="monthly">Monthly</option><option value="2months">Every 2 months</option></select>
    </div>
    <div class="field"><label>Price (£)</label><input id="f-price" type="number" placeholder="20" inputmode="numeric"></div>
    <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Access notes, special instructions…"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-blue" id="save-btn" onclick="saveCustomer()">Save</button>
    </div>
    <div id="delete-wrap" style="margin-top:10px;display:none">
      <button class="btn btn-full" style="color:var(--red);border-color:var(--red-light)" onclick="deleteCustomer()">Delete customer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function getCurrentWeek(){
  const day = new Date().getDate();
  if(day <= 7)  return 'Week 1';
  if(day <= 14) return 'Week 2';
  if(day <= 21) return 'Week 3';
  return 'Week 4';
}

function initBanner(){
  const now = new Date();
  const weekName = getCurrentWeek();
  const dateStr = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const routes = WEEKS[weekName];
  document.getElementById('today-date').textContent = '📅 ' + dateStr;
  document.getElementById('today-routes').textContent = weekName + ' · ' + routes.slice(0,2).join(', ') + (routes.length > 2 ? '…' : '');
  document.getElementById('header-week').textContent = weekName;
  activeWeek = weekName;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let customers = [];
let activeTab = 'customers';
let activeWeek = 'Week 1';
let activeRouteFilter = '';
let payFilter = '';
let editingId = null;
let histYear = new Date().getFullYear();

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function login(){
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if(!email||!pwd){ errEl.textContent='Please enter email and password'; errEl.style.display='block'; return; }
  const { error } = await db.auth.signInWithPassword({ email, password: pwd });
  if(error){ errEl.textContent = error.message; errEl.style.display='block'; }
}

async function logout(){
  if(!confirm('Sign out?')) return;
  await db.auth.signOut();
}

function showLogin(){
  document.getElementById('login-screen').classList.add('show');
  document.getElementById('loading-screen').classList.remove('show');
  document.getElementById('app').classList.remove('show');
}

function showLoading(){
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('loading-screen').classList.add('show');
  document.getElementById('app').classList.remove('show');
}

function showApp(){
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('loading-screen').classList.remove('show');
  document.getElementById('app').classList.add('show');
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadCustomers(){
  showLoading();
  const { data, error } = await db.from('customers').select('*').order('name');
  if(error){ showToast('Error loading data'); showApp(); return; }
  if(data.length === 0){
    await db.from('customers').insert(SEED);
    const { data: seeded } = await db.from('customers').select('*').order('name');
    customers = seeded || [];
  } else {
    customers = data;
  }
  showApp();
  initBanner();
  initChips();
  renderMetrics();
  renderCustomers();
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(t, btn){
  activeTab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(btn) btn.classList.add('active');
  document.querySelector('.fab').style.display = t==='customers'?'flex':'none';
  if(t==='customers'){ renderMetrics(); renderCustomers(); }
  if(t==='routes'){ renderWeekTabs(); renderRoutes(); }
  if(t==='payments'){ renderPayMetrics(); renderPayments(); }
  if(t==='history'){ renderHistory(); }
  if(t==='notify'){ renderNotifySelects(); }
}

// ── METRICS ───────────────────────────────────────────────────────────────────
function renderMetrics(){
  const total=customers.length, unpaid=customers.filter(c=>!c.paid).length;
  const monthly=customers.filter(c=>c.freq==='monthly').length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Customers</div><div class="metric-value blue">${total}</div></div>
    <div class="metric"><div class="metric-label">Unpaid</div><div class="metric-value red">${unpaid}</div></div>
    <div class="metric"><div class="metric-label">Monthly</div><div class="metric-value">${monthly}</div></div>
    <div class="metric"><div class="metric-label">Routes</div><div class="metric-value">${ROUTES.length}</div></div>`;
  document.getElementById('header-sub').textContent=`${total} customers · ${unpaid} unpaid`;
}

// ── ROUTE CHIPS ───────────────────────────────────────────────────────────────
function initChips(){
  const el=document.getElementById('route-chips');
  el.innerHTML='<button class="chip active" onclick="setRoute(\'\',this)">All</button>'+
    ROUTES.map(r=>`<button class="chip" onclick="setRoute('${r.replace(/'/g,"\\'")}',this)">${r}</button>`).join('');
}

function setRoute(r,btn){
  activeRouteFilter=r;
  document.querySelectorAll('#route-chips .chip').forEach(c=>c.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderCustomers();
}

// ── CUSTOMERS ─────────────────────────────────────────────────────────────────
function renderCustomers(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=customers.filter(c=>{
    const mq=!q||c.name.toLowerCase().includes(q)||(c.addr||'').toLowerCase().includes(q);
    const mr=!activeRouteFilter||c.route===activeRouteFilter;
    return mq&&mr;
  });
  const el=document.getElementById('customers-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>No customers found</div>';return;}
  el.innerHTML=list.map(c=>`
    <div class="customer-card">
      <div class="card-top">
        <div>
          <div class="card-name">${esc(c.name)}</div>
          <div class="card-addr">${esc(c.addr||'No address saved')}</div>
          ${c.notes?`<div class="card-note">⚠️ ${esc(c.notes)}</div>`:''}
        </div>
        <button class="btn btn-icon" onclick="openEditModal(${c.id})">✏️</button>
      </div>
      <div class="card-badges">
        <span class="badge badge-blue">${esc(c.route)}</span>
        <span class="badge ${c.freq==='monthly'?'badge-blue':'badge-amber'}">${c.freq==='monthly'?'Monthly':'Every 2 months'}</span>
        <button onclick="togglePaid(${c.id})" style="background:none;border:none;cursor:pointer;padding:0">
          <span class="badge ${c.paid?'badge-green':'badge-red'}">£${c.price} ${c.paid?'✓ Paid':'Unpaid'}</span>
        </button>
      </div>
      <div class="card-actions">
        ${c.phone?`<a href="tel:${esc(c.phone)}" class="btn btn-sm">📞 Call</a>`:''}
        ${c.phone?`<a href="sms:${esc(c.phone)}?body=${encodeURIComponent(getMsg(c,'before'))}" class="btn btn-sm">💬 Remind</a>`:''}
        ${c.phone?`<a href="sms:${esc(c.phone)}?body=${encodeURIComponent(getMsg(c,'after'))}" class="btn btn-sm">✅ Done</a>`:''}
        ${c.phone&&!c.paid?`<a href="sms:${esc(c.phone)}?body=${encodeURIComponent(getMsg(c,'payment'))}" class="btn btn-sm btn-red">💰 Pay</a>`:''}
      </div>
    </div>`).join('');
}

async function togglePaid(id){
  const c=customers.find(x=>x.id===id);
  if(!c) return;
  c.paid=!c.paid;
  await db.from('customers').update({paid:c.paid}).eq('id',id);
  renderCustomers(); renderMetrics();
  showToast(c.paid?'Marked as paid':'Marked as unpaid');
}

// ── ROUTES ────────────────────────────────────────────────────────────────────
function renderWeekTabs(){
  document.getElementById('week-tabs').innerHTML=Object.keys(WEEKS).map(w=>
    `<button class="chip ${w===activeWeek?'active':''}" onclick="setWeek('${w}')">${w}</button>`).join('');
}

function setWeek(w){ activeWeek=w; renderWeekTabs(); renderRoutes(); }

function renderRoutes(){
  const routeNames=WEEKS[activeWeek]||[];
  document.getElementById('routes-list').innerHTML=routeNames.map(r=>{
    const list=customers.filter(c=>c.route===r);
    const earned=list.filter(c=>c.paid).reduce((s,c)=>s+Number(c.price),0);
    const total=list.reduce((s,c)=>s+Number(c.price),0);
    return `<div class="route-section">
      <div class="route-title">📍 ${esc(r)} <span class="route-count">(${list.length}) · £${earned}/£${total}</span></div>
      <div style="margin-top:8px;background:var(--white);border:1px solid var(--gray-border);border-radius:var(--radius);padding:0 12px">
        ${list.map(c=>`<div class="route-item">
          <div class="route-item-info">
            <div class="route-item-name">${esc(c.name)}</div>
            <div class="route-item-addr">${esc(c.addr||'No address')}</div>
            ${c.notes?`<div class="route-item-note">${esc(c.notes)}</div>`:''}
          </div>
          <div class="route-item-actions">
            ${c.phone?`<a href="tel:${esc(c.phone)}" class="btn btn-icon btn-sm">📞</a>`:''}
            <button onclick="togglePaidRoute(${c.id},this)" class="btn btn-sm ${c.paid?'btn-green':''}">£${c.price}${c.paid?' ✓':''}</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

async function togglePaidRoute(id,btn){
  const c=customers.find(x=>x.id===id);
  if(!c) return;
  c.paid=!c.paid;
  await db.from('customers').update({paid:c.paid}).eq('id',id);
  btn.textContent=`£${c.price}${c.paid?' ✓':''}`;
  btn.classList.toggle('btn-green',c.paid);
  showToast(c.paid?'Marked as paid':'Marked as unpaid');
}

// ── PAYMENTS ──────────────────────────────────────────────────────────────────
function renderPayMetrics(){
  const paid=customers.filter(c=>c.paid), unpaid=customers.filter(c=>!c.paid);
  const col=paid.reduce((s,c)=>s+Number(c.price),0), owed=unpaid.reduce((s,c)=>s+Number(c.price),0);
  document.getElementById('pay-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Collected</div><div class="metric-value green">£${col}</div></div>
    <div class="metric"><div class="metric-label">Outstanding</div><div class="metric-value red">£${owed}</div></div>
    <div class="metric"><div class="metric-label">Paid</div><div class="metric-value">${paid.length}</div></div>
    <div class="metric"><div class="metric-label">Unpaid</div><div class="metric-value">${unpaid.length}</div></div>`;
}

function setPayFilter(f,btn){
  payFilter=f;
  document.querySelectorAll('#tab-payments .chip').forEach(c=>c.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderPayments();
}

function renderPayments(){
  const q=document.getElementById('pay-search').value.toLowerCase();
  let list=customers.filter(c=>{
    const mq=!q||c.name.toLowerCase().includes(q)||c.route.toLowerCase().includes(q);
    const mp=!payFilter||(payFilter==='paid'&&c.paid)||(payFilter==='unpaid'&&!c.paid);
    return mq&&mp;
  });
  document.getElementById('payments-list').innerHTML=list.map(c=>`
    <div class="customer-card">
      <div class="card-top">
        <div>
          <div class="card-name">${esc(c.name)}</div>
          <div class="card-addr">${esc(c.route)}</div>
          ${c.last_cleaned?`<div style="font-size:12px;color:var(--text-muted)">Last done: ${c.last_cleaned}</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:700">£${c.price}</div>
          <button onclick="togglePaidPay(${c.id})" style="background:none;border:none;cursor:pointer">
            <span class="badge ${c.paid?'badge-green':'badge-red'}">${c.paid?'✓ Paid':'Unpaid'}</span>
          </button>
        </div>
      </div>
      <div class="card-actions" style="margin-top:8px">
        <button class="btn btn-sm btn-green" onclick="markDone(${c.id})">✅ Mark done today</button>
        ${c.phone&&!c.paid?`<a href="sms:${esc(c.phone)}?body=${encodeURIComponent(getMsg(c,'payment'))}" class="btn btn-sm btn-red">💰 Request pay</a>`:''}
      </div>
    </div>`).join('');
}

async function togglePaidPay(id){
  const c=customers.find(x=>x.id===id);
  if(!c) return;
  c.paid=!c.paid;
  await db.from('customers').update({paid:c.paid}).eq('id',id);
  renderPayMetrics(); renderPayments();
  showToast(c.paid?'Marked as paid':'Marked as unpaid');
}

async function markDone(id){
  const c=customers.find(x=>x.id===id);
  if(!c) return;
  const today=new Date().toLocaleDateString('en-GB');
  const isoDate=new Date().toISOString().split('T')[0];
  await db.from('cleaning_history').insert({customer_id:id, cleaned_date:isoDate, price:c.price, paid:false});
  c.last_cleaned=today; c.paid=false;
  await db.from('customers').update({last_cleaned:today, paid:false}).eq('id',id);
  renderPayments();
  showToast('Job logged — payment reset');
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
async function renderHistory(){
  const { data:history } = await db
    .from('cleaning_history')
    .select('*, customers(name,route)')
    .gte('cleaned_date', `${histYear}-01-01`)
    .lte('cleaned_date', `${histYear}-12-31`)
    .order('cleaned_date',{ascending:false});

  if(!history||!history.length){
    document.getElementById('history-list').innerHTML='<div class="empty"><div class="empty-icon">📋</div>No history for '+histYear+'</div>';
    renderHistMetrics([]); renderHistYearTabs(); return;
  }

  renderHistMetrics(history);
  renderHistYearTabs();

  const byMonth={};
  history.forEach(h=>{
    const d=new Date(h.cleaned_date);
    const key=d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    if(!byMonth[key]) byMonth[key]=[];
    byMonth[key].push(h);
  });

  document.getElementById('history-list').innerHTML=Object.entries(byMonth).map(([month,jobs])=>{
    const earned=jobs.reduce((s,j)=>s+Number(j.price||0),0);
    return `<div class="history-month">
      <div class="history-month-header">
        <div class="history-month-name">${month}</div>
        <div class="history-month-stats">£${earned} · ${jobs.length} jobs</div>
      </div>
      <div style="background:var(--white);border:1px solid var(--gray-border);border-radius:var(--radius);padding:0 12px">
        ${jobs.map(j=>`<div class="history-row">
          <div>
            <div class="history-name">${esc(j.customers?.name||'Unknown')}</div>
            <div class="history-meta">${esc(j.customers?.route||'')} · ${new Date(j.cleaned_date).toLocaleDateString('en-GB')}</div>
          </div>
          <span class="badge ${j.paid?'badge-green':'badge-amber'}">£${j.price||0}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderHistMetrics(history){
  const total=history.reduce((s,h)=>s+Number(h.price||0),0);
  const jobs=history.length;
  document.getElementById('hist-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">${histYear} Earnings</div><div class="metric-value green">£${total}</div></div>
    <div class="metric"><div class="metric-label">Jobs Done</div><div class="metric-value blue">${jobs}</div></div>`;
}

function renderHistYearTabs(){
  const thisYear=new Date().getFullYear();
  const years=[thisYear,thisYear-1];
  document.getElementById('hist-year-tabs').innerHTML=years.map(y=>
    `<button class="chip ${y===histYear?'active':''}" onclick="setHistYear(${y})">${y}</button>`).join('');
}

function setHistYear(y){ histYear=y; renderHistory(); }

// ── NOTIFY ────────────────────────────────────────────────────────────────────
function getMsg(c,type){
  const first=c.name.split(' ')[0];
  if(type==='before') return `Hi ${first}! Just a wee reminder that we'll be around to clean your windows tomorrow. See you then! 🪣`;
  if(type==='after')  return `Hi ${first}! All done — your windows are sparkling clean! 💧 That's £${c.price} whenever suits you. Thanks a million!`;
  return `Hi ${first}! Hope you're well. Just a wee reminder that £${c.price} is still outstanding for your window cleaning. No rush but whenever you get a chance. Thanks! 🪣`;
}

function renderNotifySelects(){
  document.getElementById('notify-customer').innerHTML='<option value="">Choose a customer…</option>'+
    customers.map(c=>`<option value="${c.id}">${esc(c.name)} · ${esc(c.route)}</option>`).join('');
  document.getElementById('bulk-route').innerHTML='<option value="">Choose a route…</option>'+
    ROUTES.map(r=>`<option value="${r}">${r}</option>`).join('');
  updateNotify(); updateBulk();
}

function updateNotify(){
  const cid=document.getElementById('notify-customer').value;
  const type=document.getElementById('notify-type').value;
  const out=document.getElementById('notify-out');
  if(!cid){out.innerHTML='';return;}
  const c=customers.find(x=>x.id==cid);
  const msg=getMsg(c,type);
  out.innerHTML=`<div class="notify-msg-box">${esc(msg)}</div>
    <div class="notify-actions">
      <button class="btn" onclick="copyText('${encodeURIComponent(msg)}',this)">📋 Copy</button>
      ${c.phone?`<a href="sms:${esc(c.phone)}?body=${encodeURIComponent(msg)}" class="btn btn-blue">💬 Open in Messages</a>`:'<span style="font-size:13px;color:var(--text-muted)">No phone number saved</span>'}
    </div>`;
}

function updateBulk(){
  const r=document.getElementById('bulk-route').value;
  const type=document.getElementById('bulk-type').value;
  const out=document.getElementById('bulk-out');
  if(!r){out.innerHTML='';return;}
  const list=customers.filter(c=>c.route===r&&c.phone);
  if(!list.length){out.innerHTML='<p style="color:var(--text-muted);font-size:13px;margin-top:8px">No customers on this route have phone numbers saved.</p>';return;}
  out.innerHTML=`<p style="font-size:13px;color:var(--text-muted);margin:8px 0">${list.length} customers with phone numbers:</p>`+
    list.map(c=>{const msg=getMsg(c,type);return`
      <div class="customer-card" style="margin-bottom:8px">
        <div class="card-name" style="margin-bottom:6px">${esc(c.name)}</div>
        <div class="notify-msg-box" style="font-size:13px">${esc(msg)}</div>
        <div class="notify-actions" style="margin-top:8px">
          <button class="btn btn-sm" onclick="copyText('${encodeURIComponent(msg)}',this)">📋 Copy</button>
          <a href="sms:${esc(c.phone)}?body=${encodeURIComponent(msg)}" class="btn btn-sm btn-blue">💬 SMS</a>
        </div>
      </div>`;}).join('');
}

function copyText(encoded,btn){
  navigator.clipboard.writeText(decodeURIComponent(encoded)).then(()=>{
    const orig=btn.textContent; btn.textContent='Copied!';
    setTimeout(()=>{btn.textContent=orig;},2000);
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openAddModal(){
  editingId=null;
  document.getElementById('modal-title').textContent='Add customer';
  document.getElementById('delete-wrap').style.display='none';
  ['name','addr','phone','notes'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('f-price').value=20;
  document.getElementById('f-route').selectedIndex=0;
  document.getElementById('f-freq').selectedIndex=0;
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id){
  editingId=id;
  const c=customers.find(x=>x.id===id);
  document.getElementById('modal-title').textContent='Edit customer';
  document.getElementById('delete-wrap').style.display='block';
  document.getElementById('f-name').value=c.name;
  document.getElementById('f-addr').value=c.addr||'';
  document.getElementById('f-phone').value=c.phone||'';
  document.getElementById('f-route').value=c.route;
  document.getElementById('f-freq').value=c.freq;
  document.getElementById('f-price').value=c.price;
  document.getElementById('f-notes').value=c.notes||'';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }

async function saveCustomer(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Please enter a name');return;}
  const btn=document.getElementById('save-btn');
  btn.textContent='Saving…'; btn.disabled=true;
  const data={name, addr:document.getElementById('f-addr').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    route:document.getElementById('f-route').value,
    freq:document.getElementById('f-freq').value,
    price:parseFloat(document.getElementById('f-price').value)||20,
    notes:document.getElementById('f-notes').value.trim()};
  if(editingId){
    await db.from('customers').update(data).eq('id',editingId);
    Object.assign(customers.find(x=>x.id===editingId),data);
  } else {
    const {data:newC}=await db.from('customers').insert({...data,paid:false,last_cleaned:''}).select().single();
    if(newC) customers.push(newC);
  }
  btn.textContent='Save'; btn.disabled=false;
  closeModal(); renderMetrics(); renderCustomers();
  showToast(editingId?'Customer updated':'Customer added');
}

async function deleteCustomer(){
  if(!confirm('Delete this customer?')) return;
  await db.from('customers').delete().eq('id',editingId);
  customers=customers.filter(x=>x.id!==editingId);
  closeModal(); renderMetrics(); renderCustomers();
  showToast('Customer deleted');
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async()=>{
  try {
    const { data:{ session } } = await db.auth.getSession();
    if(session){ await loadCustomers(); }
    else { showLogin(); }
    db.auth.onAuthStateChange(async(event,session)=>{
      if(session){ await loadCustomers(); }
      else { showLogin(); customers=[]; }
    });
  } catch(e) {
    showLogin();
    document.getElementById('login-error').textContent='Config error — check your Supabase URL and key';
    document.getElementById('login-error').style.display='block';
  }
})();
</script>
